<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!-- Bootstrap 5 via CDN : feuille de style --> 
<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
rel="stylesheet"> 

<!-- Votre feuille de style personnelle --> 
<link rel="stylesheet" href="css/style.css">
<body>

    <div class="container-2">

        <div class="form-box">

            <h1>FORMULAIRE DE CONTACT</h1>
        <form>   
            <div class="row">

                <div class="box-1">
                    <input type="text" id="nom" placeholder="Nom">
                    <p class="error" id="nomError"></p>
                </div>

                <div class="box-1">
                   <input type="text" id="prenom" placeholder="Prénom">
                   <p class="error" id="prenomError"></p>
                </div>

               <div class="box-1">
                   <input type="email" id="email" placeholder="Email">
                   <p class="error" id="emailError"></p>
                </div>

                <div class="box-1">
                    <select id="sujet">
                        <option value="">Choisissez un sujet</option>
                        <option>Information</option>
                        <option>Support</option>
                        <option>Partenariat</option>
                        <option>Autres</option>
                    </select>

                    <p class="error" id="sujetError"></p>

                </div>

                <div class="">
                   <textarea id="message" placeholder="Votre message..."></textarea>
                   <p class="error" id="messageError"></p>
                </div>

            <button class="btn-9" id="sendBtn">
                ENVOYER
            </button>

            <p class="success" id="successMessage">
                Message envoyé avec succès
            </p>

        </form> 
    </div>
     </div>

    <!--Informations-->

<div>

    <div class="info-box">

        <h1>Coordonnées</h1>
        <p>
            📧
            <a href="#">
                contact@gmail.com
            </a>
        </p>
        <p>
            📞 +221 77 000 00 00
        </p>
        <p>
            📍 Dakar, Sénégal
        </p>

    </div>
    <iframe 
            src="https://maps.google.com/maps?q=dakar&t=&z=13&ie=UTF8&iwloc=&output=embed">
    </iframe>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>
      <script src="js/main.js"></script>

</body>
</html>
